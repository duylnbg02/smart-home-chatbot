<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-top">
                <div style="display:flex; align-items:center; gap:10px;">
                    <a href="dashboard.html" class="back-btn" title="Quay lại Dashboard">←</a>
                    <h1>🤖 AI Assistant</h1>
                </div>
                <div class="user-info">
                    <span id="username"></span>
                    <button id="logoutBtn" class="logout-btn">Đăng xuất</button>
                </div>
            </div>
            <p>Chào mừng bạn! Hãy hỏi tôi bất cứ điều gì</p>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message bot-message">
                <p>Xin chào! Tôi có thể giúp bạn điều gì?</p>
            </div>
        </div>

        <div class="chat-input-area">
            <button id="micBtn" class="mic-btn" title="Nhấn để nói">🎤</button>
            <input 
                type="text" 
                id="messageInput" 
                class="chat-input" 
                placeholder="Nhập tin nhắn hoặc nhấn 🎤 để nói..."
                autocomplete="off"
            >
            <button id="ttsBtn" class="tts-btn" title="Bật/tắt đọc câu trả lời">🔊</button>
            <button id="sendBtn" class="send-btn">Gửi</button>
        </div>
    </div>

    <script src="js/chat.js"></script>
</body>
</html>
